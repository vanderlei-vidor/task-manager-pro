# =====================================================================
# PERFIL DE TESTE (profile "test")
# Usado pelo AuthControllerIntegrationTest (@ActiveProfiles("test"))
#
# Objetivo: testes independentes de PostgreSQL — rodam em qualquer CI.
# H2 em memória + Flyway aplicando as mesmas migrations do app.
# =====================================================================

# NOTA: spring.profiles.active NÃO pode ser declarado aqui (proteção do Spring Boot).
# O perfil "test" é ativado via @ActiveProfiles("test") na classe de teste.

# ===== Database (H2 em memória — isolado, sem infraestrutura) =====
spring.datasource.url=jdbc:h2:mem:taskmanager_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console desabilitado em testes (não há navegador)
spring.h2.console.enabled=false

# ===== JPA/Hibernate =====
# Flyway cria o schema; Hibernate só valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ===== Flyway (mesmas migrations do app — garante paridade dev/prod/test) =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Server =====
server.port=0

# ===== JWT (secret de teste — tem 64+ chars para passar o fail-fast do JwtUtilService) =====
application.jwt.secret=test-secret-key-for-ci-with-at-least-32-bytes-for-hs256-padding
application.jwt.expiration-ms=900000
application.jwt.refresh-token.expiration-ms=604800000

# ===== CORS (não relevante em testes, mas evita erro de bind) =====
application.cors.allowed-origins=http://localhost:3000,http://localhost:8081
application.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
application.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
application.cors.exposed-headers=Authorization,Content-Disposition
application.cors.allow-credentials=true
application.cors.max-age=3600
