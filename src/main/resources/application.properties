
# ===== Database =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ✅ MUDAR PARA create-drop (apaga e recria tudo!)
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=${SERVER_PORT:8081}

# ===== JWT =====
application.jwt.secret=${JWT_SECRET:}
application.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
application.jwt.refresh-token.expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
application.jwt.refresh-token.rotation-enabled=true
application.jwt.refresh-token.family-revocation=false
application.jwt.refresh-token.cleanup-interval-hours=24

# --- CORS ---
application.cors.allowed-origins=http://localhost:3000,http://localhost:8081
application.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
application.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
application.cors.exposed-headers=Authorization,Content-Disposition
application.cors.allow-credentials=true
application.cors.max-age=3600

# --- Security ---
application.security.rate-limit.enabled=true
application.security.rate-limit.requests-per-minute=60
application.security.rate-limit.requests-per-hour=1000
application.security.rate-limit.login-attempts-per-minute=5
application.security.rate-limit.lockout-minutes=15

application.security.brute-force.enabled=true
application.security.brute-force.max-failed-attempts=5
application.security.brute-force.lockout-duration-minutes=30
application.security.brute-force.attempt-window-minutes=15

application.security.headers.content-security-policy=default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https://cdn.jsdelivr.net;
application.security.headers.strict-transport-security=max-age=31536000; includeSubDomains
application.security.headers.content-type-options=nosniff
application.security.headers.frame-options=DENY
application.security.headers.xss-protection=1; mode=block
application.security.headers.referrer-policy=strict-origin-when-cross-origin

# --- Audit ---
application.audit.enabled=true
application.audit.audit-login-attempts=true
application.audit.audit-password-changes=true
application.audit.audit-deletions=true
application.audit.audit-permission-changes=true
application.audit.retention-days=90

# --- SMTP ---
application.smtp.host=${SMTP_HOST:localhost}
application.smtp.port=${SMTP_PORT:587}
application.smtp.username=${SMTP_USERNAME:}
application.smtp.password=${SMTP_PASSWORD:}
application.smtp.enable-ssl=true
application.smtp.from-email=${SMTP_FROM_EMAIL:noreply@taskmanager.com}
application.smtp.from-name=Task Manager Pro

# --- App Info ---
application.app.name=Task Manager Pro
application.app.version=1.0.0
application.app.environment=${APP_ENVIRONMENT:dev}
application.app.base-url=${APP_BASE_URL:http://localhost:8081}
application.app.timezone=America/Sao_Paulo



# ===== Task Manager =====
application.manager-name=task-manager-pro