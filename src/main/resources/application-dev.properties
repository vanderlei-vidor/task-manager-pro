# ===== Perfil ativo =====
# Ativa o perfil de desenvolvimento, que libera:
#  - H2 Console
#  - Seed automático do admin de teste (DataInitializer)
# Em produção, NUNCA use este perfil.
spring.profiles.active=dev

# ===== H2 Database em Memória (Desenvolvimento) =====
spring.datasource.url=jdbc:h2:mem:taskmanager_dev
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===== H2 Console (Acessar pelo navegador!) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===== JPA/Hibernate =====
# ✅ Flyway cria o schema. Hibernate só valida (unificado com prod).
spring.jpa.hibernate.ddl-auto=validate

# Flyway: mesmas migrations do prod rodam no H2
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Em dev, ver SQL é útil
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8081

# ===== Application Properties =====
application.jwt-secret=esta-e-minha-chave-super-secreta-para-jwt-2026-com-64-caracteres
application.jwt-expiration-ms=86400000
application.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8081
application.allowed-methods=GET,POST,PUT,DELETE
application.allowed-headers=Authorization,Content-Type
application.smtp-host=
application.smtp-port=587
application.smtp-username=
application.smtp-password=
application.smtp-enable-ssl=true
application.manager-name=task-manager-pro-dev