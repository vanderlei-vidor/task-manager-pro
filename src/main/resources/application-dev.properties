# ===== H2 Database em Memória (Desenvolvimento) =====
spring.datasource.url=jdbc:h2:mem:taskmanager_dev
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===== H2 Console (Acessar pelo navegador!) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===== JPA/Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8081

# ===== Application Properties =====
application.jwt-secret=esta-e-minha-chave-super-secreta-para-jwt-2026-com-64-caracteres
application.jwt-expiration-ms=86400000
application.allowed-origins=http://localhost:3000,http://localhost:4200
application.allowed-methods=GET,POST,PUT,DELETE
application.allowed-headers=Authorization,Content-Type
application.smtp-host=
application.smtp-port=587
application.smtp-username=
application.smtp-password=
application.smtp-enable-ssl=true
application.manager-name=task-manager-pro-dev