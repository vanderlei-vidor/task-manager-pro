<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="modalEditar(task)">
        <div class="modal fade" th:id="'modalEditar' + ${task.id}" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-premium">
                    <form th:action="@{/tarefas/editar/{id}(id=${task.id})}" method="post">
                        <div class="modal-header-premium">
                            <h5 class="modal-title">Editar Tarefa</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label-premium">Título *</label>
                                <input type="text" name="title" th:value="${task.title}" class="form-control-premium"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-premium">Descrição</label>
                                <textarea name="description" class="form-control-premium" rows="3"
                                    th:text="${task.description}"></textarea>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label-premium">Status</label>
                                    <select name="status" class="form-control-premium">
                                        <option value="TODO" th:selected="${task.status.name() == 'TODO'}">Pendente
                                        </option>
                                        <option value="DOING" th:selected="${task.status.name() == 'DOING'}">Em
                                            Andamento</option>
                                        <option value="DONE" th:selected="${task.status.name() == 'DONE'}">Concluída
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label-premium">Prioridade</label>
                                    <select name="priority" class="form-control-premium">
                                        <option value="LOW" th:selected="${task.priority.name() == 'LOW'}">🟢 Baixa
                                        </option>
                                        <option value="MEDIUM" th:selected="${task.priority.name() == 'MEDIUM'}">🟡
                                            Média</option>
                                        <option value="HIGH" th:selected="${task.priority.name() == 'HIGH'}">🔴 Alta
                                        </option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label-premium">Prazo *</label>
                                    <input type="date" name="dueDate" th:value="${task.dueDate}"
                                        class="form-control-premium" required>
                                </div>
                                <!-- ✅ CAMPO DE TAGS CORRIGIDO -->
                                <div class="col-12">
                                    <label class="form-label-premium">
                                        <i class="bi bi-tags me-1"></i>Tags
                                    </label>
                                    <div class="tags-selector">
                                        <div th:each="tag : ${listaTags}" class="tag-checkbox-wrapper">
                                            <input type="checkbox" class="tag-checkbox" th:id="'tag-' + ${tag.id}"
                                                name="tagIds" th:value="${tag.id}">
                                            <label th:for="'tag-' + ${tag.id}" class="tag-label"
                                                th:style="'--tag-color:' + ${tag.color}">
                                                <span class="tag-color-dot"
                                                    th:style="'background:' + ${tag.color}"></span>
                                                <span th:text="${tag.name}">Tag</span>
                                            </label>
                                        </div>
                                        <div th:if="${#lists.isEmpty(listaTags)}" class="text-muted small p-2">
                                            Nenhuma tag criada ainda. Crie tags na seção de tags!
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer-premium">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary-premium">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
