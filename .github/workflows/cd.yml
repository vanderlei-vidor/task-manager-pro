# =====================================================================
# CD — Task Manager Pro
# Build da imagem Docker multi-stage e push para GHCR em tags v*.*.*
# Deploy cloud é opcional (controlado por secret CLOUD_DEPLOY_ENABLED)
# =====================================================================
name: CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  # ===================================================================
  # JOB 1: BUILD DA IMAGEM DOCKER + PUSH PARA GHCR
  # ===================================================================
  docker-build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # Extrai metadados: tags (latest + versão), labels
      - name: 🏷️ Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha

      # Login no GHCR usando o GITHUB_TOKEN (built-in, sem criar secret manual)
      - name: 🔑 Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Buildx + cache de camadas para acelerar builds futuros
      - name: 🏗️ Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================================================================
  # JOB 2: DEPLOY CLOUD (OPCIONAL)
  # Só roda se o secret CLOUD_DEPLOY_ENABLED == 'true'.
  # Deixe abaixo os exemplos comentados para o provedor que você escolher.
  # ===================================================================
  deploy-cloud:
    name: Deploy to Cloud (optional)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: ${{ secrets.CLOUD_DEPLOY_ENABLED == 'true' }}
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # EXEMPLO — Render (https://render.com)
      # Configure no GitHub: secret RENDER_API_KEY e RENDER_SERVICE_ID
      # -----------------------------------------------------------------
      # - name: 🚀 Deploy to Render
      #   env:
      #     RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      #   run: |
      #     curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
      #       -H "Authorization: Bearer $RENDER_API_KEY" \
      #       -H "Content-Type: application/json"

      # -----------------------------------------------------------------
      # EXEMPLO — Railway (https://railway.app)
      # Configure no GitHub: secret RAILWAY_TOKEN
      # -----------------------------------------------------------------
      # - name: 🚀 Deploy to Railway
      #   uses: bervProject/railway-deploy@v3
      #   with:
      #     service: task-manager-pro
      #     token: ${{ secrets.RAILWAY_TOKEN }}

      # -----------------------------------------------------------------
      # EXEMPLO — Fly.io (https://fly.io)
      # Configure no GitHub: secret FLY_API_TOKEN (e crie fly.toml no repo)
      # -----------------------------------------------------------------
      # - name: 🚀 Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: ⏸️ Deploy cloud desativado
        run: |
          echo "Deploy cloud desativado."
          echo "Para ativar: configure o secret CLOUD_DEPLOY_ENABLED=true"
          echo "e descomente o bloco do provedor desejado neste workflow."
