# CD — Gerenciador de Tarefas Pro
# Build da imagem Docker multi-stage e push para GHCR em tags v*.*.*
# =====================================================================
name: CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  # ===================================================================
  # TRABALHO 1: CONSTRUIR A IMAGEM DOCKER + PUSH PARA GHCR
  # ===================================================================
  docker-build-push:
    name: Criar e enviar imagem Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Código de checkout
        uses: actions/checkout@v4

      # Extrai metadados: tags (última + versão), rótulos
      - name: 🏷️ Metadados do Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha

      # Faça login no GHCR usando o GITHUB_TOKEN
      - name: 🔑 Login no GHCR
        uses: docker/docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Buildx + cache de camadas para acelerar builds futuras
      - name: 🏗️ Configuração Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Construir e Empurrar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max